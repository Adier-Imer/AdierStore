<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdierStore - Zapatillas, Ropa y Accesorios</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="logo">Adier<span>Store</span></div>
      <nav>
        <ul class="nav-links">
          <li><a href="#" data-category="all">Inicio</a></li>
          <li><a href="#" data-category="zapatilla">Zapatilla</a></li>
          <li><a href="#" data-category="ropa">Ropa</a></li>
          <li><a href="#" data-category="accesorio">Accesorio</a></li>
        </ul>
      </nav>
      <div class="cart-icon" id="cartIcon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="hero-content">
        <h1>Nuevas Colecciones</h1>
        <p>Zapatillas, ropa y accesorios originales para hombre y mujer</p>
        <a href="#" class="btn" data-category="all">Ver Todo</a>
      </div>
    </div>
  </section>

  <section class="filters">
    <div class="container">
      <div class="filter-group">
        <button class="filter-btn filter-gender active" data-gender="all">Todo</button>
        <button class="filter-btn filter-gender" data-gender="hombre">Hombre</button>
        <button class="filter-btn filter-gender" data-gender="mujer">Mujer</button>
      </div>
      <select id="sortBy">
        <option value="default">Ordenar por</option>
        <option value="price-asc">Menor precio</option>
        <option value="price-desc">Mayor precio</option>
        <option value="name">Nombre A-Z</option>
      </select>
    </div>
  </section>

  <section class="products">
    <div class="container">
      <div class="product-grid" id="productGrid"></div>
    </div>
  </section>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="productModal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body">
        <div class="modal-image">
          <img id="modalImg" src="" alt="">
        </div>
        <div class="modal-details">
          <div class="modal-gender" id="modalGender"></div>
          <div class="modal-category" id="modalCategory"></div>
          <h2 class="modal-name" id="modalName"></h2>
          <div class="modal-price" id="modalPrice"></div>

          <div class="selector-group" id="sizeGroup">
            <label>Talla</label>
            <div class="option-group" id="sizeOptions"></div>
          </div>

          <div class="selector-group" id="colorGroup">
            <label>Color</label>
            <div class="option-group" id="colorOptions"></div>
          </div>

          <div class="selector-group">
            <label>Cantidad</label>
            <div class="qty-selector">
              <button id="modalQtyDown">−</button>
              <span id="modalQty">1</span>
              <button id="modalQtyUp">+</button>
            </div>
          </div>

          <button class="btn btn-add-modal" id="modalAddBtn">Agregar al Carrito</button>
        </div>
      </div>
    </div>
  </div>

  <div class="cart-overlay" id="cartOverlay">
    <div class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h2>Carrito</h2>
        <button id="closeCart">&times;</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total:</span>
          <span id="cartTotal">S/0</span>
        </div>
        <button class="btn btn-whatsapp" id="btnWhatsapp">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Contactar por WhatsApp
        </button>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>&copy; 2026 AdierStore. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
